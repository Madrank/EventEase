version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventease-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: eventease
      POSTGRES_PASSWORD: eventease123
      POSTGRES_DB: eventease
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventease']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventease-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eventease-server
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://eventease:eventease123@postgres:5432/eventease
      REDIS_URL: redis://redis:6379
      JWT_SECRET: votre-secret-jwt-tres-securise
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eventease-client
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      REACT_APP_WS_URL: ws://localhost:3001
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public

volumes:
  postgres_data:
  redis_data:
